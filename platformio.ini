; =============================================================================
; Sesame Robot — PlatformIO Configuration
; =============================================================================
; Build a specific environment with:
;   pio run -e esp32cam
;   pio run -e esp32s3cam
;   pio run -e distro_v2
;   pio run -e distro_v1
;   pio run -e lolin_s2_mini        (default)
;
; Upload:
;   pio run -e <env> -t upload
; =============================================================================

[platformio]
default_envs = esp32cam
src_dir      = firmware

; ── Shared settings ───────────────────────────────────────────────────────────
[env]
framework      = arduino
monitor_speed  = 115200
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library@2.4.1
    adafruit/Adafruit SSD1306@2.5.13
    adafruit/Adafruit GFX Library@1.11.11
    adafruit/Adafruit BusIO@1.16.2
    madhephaestus/ESP32Servo@3.0.6

; ── AI-Thinker ESP32-CAM ─────────────────────────────────────────────────────
[env:esp32cam]
platform = espressif32@6.9.0
board    = esp32cam
build_flags =
    -DBOARD_ESP32CAM
    -DCORE_DEBUG_LEVEL=3
board_build.partitions = min_spiffs.csv
; upload_port = /dev/ttyUSB0
upload_port = sesame-robot.local

; ── Generic ESP32-S3-CAM ─────────────────────────────────────────────────────
[env:esp32s3cam]
platform = espressif32@6.9.0
board    = esp32-s3-devkitc-1
build_flags =
    -DBOARD_ESP32S3CAM
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = min_spiffs.csv

; ── Sesame Distro Board V2 (ESP32-S3) ────────────────────────────────────────
[env:distro_v2]
platform = espressif32@6.9.0
board    = esp32-s3-devkitc-1
build_flags =
    -DBOARD_DISTRO_V2
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = min_spiffs.csv

; ── Sesame Distro Board V1 (ESP32-WROOM32) ───────────────────────────────────
[env:distro_v1]
platform = espressif32@6.9.0
board    = esp32dev
build_flags =
    -DBOARD_DISTRO_V1
    -DCORE_DEBUG_LEVEL=3

; ── Lolin S2 Mini (default) ──────────────────────────────────────────────────
[env:lolin_s2_mini]
platform = espressif32@6.9.0
board    = lolin_s2_mini
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = min_spiffs.csv
